# Dev / staging local — moteur reco + variables depuis .env
services:
  reco:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RECO_HOST: "0.0.0.0"
      RECO_PORT: "8000"
      CATALOG_FILTER_PATH: "/app/data/catalog-filter.json"
      RECO_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
